[defaults]
inventory = ./hosts
host_key_checking = False
# Utile pour l'auth par mot de passe (sshpass) et pour ignorer les cles d'hote inconnues
# d'une VM jetable recreee a chaque terraform apply.

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s
