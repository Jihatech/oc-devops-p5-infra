#-----------------------------------------------------------------------------
# Exercice 3 - Load-balancer HAProxy (option Docker local)
# 1 HAProxy repartit le trafic HTTP en round-robin sur 2 backends nginxdemos/hello,
# avec health checks HTTP et bascule (failover) + reintegration automatiques.
# Chaque directive importante est commentee (livrable cle de l'exercice).
#-----------------------------------------------------------------------------

global
  maxconn 100                       # nombre max de connexions simultanees gerees par HAProxy
  log stdout format raw local0 info # logs envoyes sur la sortie standard (visibles via docker logs)

defaults
  mode http                         # equilibrage au niveau HTTP (couche 7)
  log global                        # herite de la configuration de log definie dans global
  option httplog                    # format de log detaille specifique HTTP (methode, statut, backend...)
  option dontlognull                # ne pas polluer les logs avec les checks/connexions vides
  timeout client 10s                # delai max d'inactivite cote client
  timeout connect 5s                # delai max pour etablir la connexion vers un backend
  timeout server 10s                # delai max d'inactivite cote serveur backend
  timeout http-request 10s          # delai max pour recevoir la requete HTTP complete du client
  # Parametres de health check appliques par defaut a chaque "server" :
  #   inter 2s : sonde toutes les 2 s | fall 3 : 3 echecs consecutifs => serveur DOWN
  #   rise 2  : 2 succes consecutifs => serveur reinjecte (UP).
  # Compromis : assez reactif pour basculer vite, sans fausses alertes sur un simple hoquet.
  default-server inter 2s fall 3 rise 2

# Point d'entree : HAProxy ecoute le trafic HTTP entrant.
frontend http_in
  bind *:80                         # ecoute sur le port 80 du conteneur (publie sur l'hote)
  default_backend web_servers       # tout le trafic est route vers le backend ci-dessous

# Groupe des serveurs applicatifs a equilibrer.
backend web_servers
  balance roundrobin                # repartition round-robin : chaque requete alterne de serveur
  option httpchk GET /              # sonde HTTP active : requete "GET /" envoyee periodiquement
  http-check expect status 200      # le backend est sain uniquement s'il repond HTTP 200
  # "check" active la surveillance de sante sur chaque serveur (parametres via default-server).
  server webserver1 webserver1:80 check
  server webserver2 webserver2:80 check

# Page de statistiques HAProxy (pratique pour visualiser l'etat UP/DOWN des serveurs).
frontend stats
  bind *:8404                       # interface de stats sur un port dedie
  stats enable                      # active la page de stats
  stats uri /                       # accessible a la racine du port 8404
  stats refresh 5s                  # rafraichissement automatique toutes les 5 s
