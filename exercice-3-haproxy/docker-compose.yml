services:
  webserver1:
    image: nginxdemos/hello
    container_name: webserver1

  webserver2:
    image: nginxdemos/hello
    container_name: webserver2

  haproxy:
    image: haproxy:2.3
    container_name: haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    ports:
      - 8080:80     # trafic applicatif equilibre
      - 8404:8404   # page de statistiques HAProxy
    depends_on:
      - webserver1
      - webserver2
